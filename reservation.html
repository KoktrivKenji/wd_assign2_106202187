<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Kenji's Guide | Restaurant Discovery & Reservations</title>
     <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="js/script.js"></script>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="Kenji's Guide Logo" class="logo">
        <h1>Kenji's Guide</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="restaurants.html">Browse Restaurants</a>
        <a href="recommend.html">Get Recommendations</a>
        <a href="register.html">Register</a>
        <a href="reservation.html" class="active-page">Make Reservation</a>
    </nav>

    <main>
        <h2>Secure Your Table</h2>
        <div id="reservationErrors" class="error-box hidden"></div>

        <form id="reservationForm" method="POST" action="http://mercury.swin.edu.au/it000000/cos10005/regtest.php">
            <fieldset>
                <legend>Booking Details</legend>

                <p>
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </p>

                <p>
                    <label for="resEmail">Email Address:</label>
                    <input type="email" id="resEmail" name="resEmail" required>
                </p>

                <p>
                    <label for="resPhone">Phone Number:</label>
                    <input type="tel" id="resPhone" name="resPhone" required placeholder="Min 10 digits">
                </p>

                <p>
                    <label for="restaurantSelect">Select Restaurant:</label>
                    <select id="restaurantSelect" name="restaurantSelect" required>
                        <option value="">-- Choose a Restaurant --</option>
                        <option value="olive_garden">The Olive Garden Bistro</option>
                        <option value="the_observatory">The Observatory</option>
                        <option value="Samut">Samut Restaurants</option>
                        <option value="Bowltiful">Bowltiful Halal Lanzhou Handmade Noodles </option>
                        <option value="Shu">SHU Melbourne</option>
                        <option value="Mint&Co">Mint&Co.</option>
                    </select>
                </p>

                <p>
                    <label for="resDate">Reservation Date & Time:</label>
                    <input type="datetime-local" id="resDate" name="resDate" required>
                </p>

                <p>
                    <label for="partySize">Number of People:</label>
                    <input type="number" id="partySize" name="partySize" min="1" required>
                </p>

                <p>
                    <label for="specialRequests">Special Requests (Optional):</label>
                    <textarea id="specialRequests" name="specialRequests" rows="3"></textarea>
                </p>
            </fieldset>

            <fieldset>
                <legend>Deposit & Payment Information</legend>

                <p>
                    <label for="depositAmount">Required Deposit Amount ($):</label>
                    <input type="text" id="depositAmount" name="depositAmount" readonly value="20.00">
                </p>

                <p>
                    <label>Select Deposit Method:</label>
                    <label><input type="radio" name="paymentMethod" value="voucher"> Voucher</label>
                    <label><input type="radio" name="paymentMethod" value="online"> Online Payment</label>
                </p>

                <div id="voucherSection" class="hidden">
                    <p>
                        <label for="voucherCode">12-Digit Voucher Code:</label>
                        <input type="text" id="voucherCode" name="voucherCode" maxlength="12" placeholder="123456789012">
                    </p>
                </div>

                
                    <p>
                        <label for="cardNumber">Credit Card Number:</label>
                        <input type="text" id="cardNumber" name="cardNumber" placeholder="No spaces or dashes">
                        <small>Visa/Mastercard: 16 digits | Amex: 15 digits</small>
                    </p>
                

                <p>
                    <label for="billEmail"> Billing Email Address:</label>
                    <input type="email" id="billEmail">
                    
                    <label><input type="checkbox" id="sameEmailCheck"> Same as reservation email address</label>
                </p>

                <button type="submit">Confirm Reservation</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Koktriv Phu. All rights reserved for assignment 2 in COS10005.</p>
    </footer>
    
</body>
</html>
